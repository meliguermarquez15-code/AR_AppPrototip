<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Menú Gastronómico AR Inteligente</title>
    
    <!-- Librerías CDN Oficiales -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            touch-action: none;
            background: transparent !important;
            -webkit-user-select: none;
            user-select: none;
        }

        a-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
        }

        #ui-container {
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .info-card {
            align-self: center;
            width: 90%;
            max-width: 380px;
            background: rgba(15, 15, 15, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 20px;
            padding: 16px 22px;
            color: white;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .info-card h3 { 
            margin: 0 0 6px 0; 
            font-size: 17px; 
            color: #ff9f43;
            letter-spacing: 0.3px;
        }
        
        .info-card p { 
            margin: 0; 
            font-size: 13px; 
            color: rgba(255, 255, 255, 0.9); 
            line-height: 1.4; 
        }
    </style>

    <script>
        AFRAME.registerComponent('gestos-blender', {
            schema: {
                minScale: { type: 'number', default: 0.2 },
                maxScale: { type: 'number', default: 1.4 }
            },
            init: function () {
                this.model = this.el;
                this.isFound = false;
                
                this.touchState = { 
                    oneFinger: false, twoFingers: false, 
                    startDist: 0, startScale: 0.5 
                };
                
                this.lastX = 0;
                this.lastY = 0;

                let parentTarget = this.el.parentNode;
                while (parentTarget && !parentTarget.hasAttribute('mindar-image-target')) {
                    parentTarget = parentTarget.parentNode;
                }
                
                if (parentTarget) {
                    parentTarget.addEventListener('targetFound', () => { this.isFound = true; });
                    parentTarget.addEventListener('targetLost', () => { this.isFound = false; });
                }

                window.addEventListener('touchstart', (e) => {
                    if (!this.isFound) return;
                    e.preventDefault();

                    if (e.touches.length === 1) {
                        this.touchState.oneFinger = true;
                        this.touchState.twoFingers = false;
                        this.lastX = e.touches[0].clientX;
                        this.lastY = e.touches[0].clientY;
                    } else if (e.touches.length === 2) {
                        this.touchState.oneFinger = false;
                        this.touchState.twoFingers = true;
                        this.touchState.startDist = this.getDist(e.touches[0], e.touches[1]);
                        this.touchState.startScale = this.model.getAttribute('scale').x;
                    }
                }, { passive: false });

                window.addEventListener('touchmove', (e) => {
                    if (!this.isFound) return;
                    e.preventDefault();

                    if (this.touchState.oneFinger && e.touches.length === 1) {
                        let currentX = e.touches[0].clientX;
                        let currentY = e.touches[0].clientY;
                        
                        let deltaX = currentX - this.lastX;
                        let deltaY = currentY - this.lastY;
                        
                        this.lastX = currentX;
                        this.lastY = currentY;

                        const speed = 0.006; 
                        
                        this.model.object3D.rotateOnWorldAxis(new THREE.Vector3(0, 1, 0), deltaX * speed);
                        this.model.object3D.rotateOnWorldAxis(new THREE.Vector3(1, 0, 0), deltaY * speed);

                    } else if (this.touchState.twoFingers && e.touches.length === 2) {
                        let currentDist = this.getDist(e.touches[0], e.touches[1]);
                        let scaleFactor = currentDist / this.touchState.startDist;
                        let finalScale = Math.max(this.data.minScale, Math.min(this.data.maxScale, this.touchState.startScale * scaleFactor));
                        this.model.setAttribute('scale', { x: finalScale, y: finalScale, z: finalScale });
                    }
                }, { passive: false });

                window.addEventListener('touchend', () => {
                    this.touchState.oneFinger = false;
                    this.touchState.twoFingers = false;
                });
            },
            getDist: function(t1, t2) {
                return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
            }
        });
    </script>
</head>
<body>

    <div id="ui-container">
        <div class="info-card">
            <h3 id="status-title">Escaneando menú...</h3>
            <p id="status-desc">Apunta tu cámara hacia la fotografía de cualquier platillo para ver su simulación interactiva.</p>
        </div>
    </div>

    <!-- Escena AR con Filtros de Estabilización Optimizados -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; maxTrack: 1; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 15; warmupTolerance: 5;" 
        renderer="colorManagement: true; physicallyCorrectLights: true;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <!-- Sistema de iluminación de alto rendimiento para modelos GLB -->
        <a-entity light="type: ambient; intensity: 1.8;"></a-entity>
        <a-entity light="type: directional; intensity: 2.5; position: 1 4 2;"></a-entity>
        <a-entity light="type: directional; intensity: 1.2; position: -1 -2 -1;"></a-entity>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- ================= TARGET INDEX 0: CAFÉ ================= -->
        <a-entity id="target-cafe" mindar-image-target="targetIndex: 0">
            <a-entity rotation="90 0 0">
                <a-gltf-model 
                    src="./mi_modelo.glb" 
                    position="0 0 0" 
                    scale="0.5 0.5 0.5" 
                    gestos-blender
                    animation-mixer="clip: *; loop: repeat;">
                </a-gltf-model>
            </a-entity>
        </a-entity>

        <!-- ================= TARGET INDEX 1: PLATO PRINCIPAL ================= -->
        <a-entity id="target-plato" mindar-image-target="targetIndex: 1">
            <a-entity rotation="90 0 0">
                <a-gltf-model 
                    src="./plato_principal.glb" 
                    position="0 0 0" 
                    scale="0.5 0.5 0.5" 
                    gestos-blender
                    animation-mixer="clip: *; loop: repeat;">
                </a-gltf-model>
            </a-entity>
        </a-entity>

        <!-- ================= TARGET INDEX 2: POSTRE ================= -->
        <a-entity id="target-postre" mindar-image-target="targetIndex: 2">
            <a-entity rotation="90 0 0">
                <a-gltf-model 
                    src="./postre.glb" 
                    position="0 0 0" 
                    scale="0.5 0.5 0.5" 
                    gestos-blender
                    animation-mixer="clip: *; loop: repeat;">
                </a-gltf-model>
            </a-entity>
        </a-entity>

    </a-scene>

    <script>
        const menuGastronomico = {
            'target-cafe': {
                titulo: "☕ Café Espresso Premium",
                desc: "Humo y aroma digital activo. Rótalo libremente en cualquier ángulo con tu dedo para apreciar la taza."
            },
            'target-plato': {
                titulo: "🍛 Especialidad Gourmet",
                desc: "Ingredientes frescos renderizados a escala real. Desliza tu dedo para inspeccionar el platillo."
            },
            'target-postre': {
                titulo: "🍰 Postre de la Casa",
                desc: "Delicada textura dulce tridimensional. Usa dos dedos en pinza si deseas ampliar la visualización."
            }
        };

        const statusTitle = document.getElementById('status-title');
        const statusDesc = document.getElementById('status-desc');

        Object.keys(menuGastronomico).forEach(id => {
            const elementoTarget = document.getElementById(id);
            if (elementoTarget) {
                elementoTarget.addEventListener('targetFound', () => {
                    statusTitle.innerText = menuGastronomico[id].titulo;
                    statusDesc.innerText = menuGastronomico[id].desc;
                });

                elementoTarget.addEventListener('targetLost', () => {
                    statusTitle.innerText = "Escaneando menú...";
                    statusDesc.innerText = "Apunta tu cámara hacia la fotografía de cualquier platillo para ver su simulación interactiva.";
                });
            }
        });
    </script>
</body>
</html>
