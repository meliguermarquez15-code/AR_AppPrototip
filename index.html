<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor AR Simple</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; touch-action: none; background: #000; font-family: sans-serif; }
        a-scene { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* Pantalla de inicio para desbloquear la cámara en móviles */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999; color: white; text-align: center;
        }
        #start-btn {
            margin-top: 20px; padding: 15px 30px; font-size: 18px; background: #007AFF;
            color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold;
        }
        #status-ui {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 12px 24px; border-radius: 25px;
            font-size: 14px; z-index: 100; pointer-events: none; display: none; border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <!-- Botón obligatorio para móviles -->
    <div id="start-overlay">
        <h2>Scanner AR</h2>
        <p>Apunta a la imagen de referencia.<br>1 dedo: rotar | 2 dedos: escalar</p>
        <button id="start-btn">📷 Iniciar Cámara</button>
        <p id="error-msg" style="color: #ff6b6b; font-size: 12px; margin-top: 15px; display: none;"></p>
    </div>

    <div id="status-ui"><span id="status-text">Iniciando...</span></div>

    <!-- autoStart: false es CLAVE para GitHub Pages -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes;" 
             color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false">
        
        <a-assets>
            <!-- VERIFICA QUE ESTOS NOMBRES COINCIDAN EXACTAMENTE CON TU REPOSITORIO -->
            <a-asset-item id="modelo-ar" src="./mi_modelo.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
            <a-light type="directional" color="#ffffff" intensity="1.0" position="1 2 1"></a-light>
            
            <a-gltf-model id="modelo-3d" src="#modelo-ar" position="0 0.1 0" scale="0.5 0.5 0.5"
                animation__appear="property: scale; from: 0.01 0.01 0.01; to: 0.5 0.5 0.5; dur: 400; startEvents: targetFound"
                animation__rot="property: rotation; to: 0 360 0; dur: 8000; easing: linear; loop: true; startEvents: targetFound">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('start-overlay');
        const statusUI = document.getElementById('status-ui');
        const errorMsg = document.getElementById('error-msg');

        startBtn.addEventListener('click', async () => {
            startBtn.innerText = 'Cargando...';
            try {
                const scene = document.querySelector('a-scene');
                await new Promise(resolve => scene.hasLoaded ? resolve() : scene.addEventListener('loaded', resolve));
                
                // Iniciar cámara manualmente
                scene.systems['mindar-image'].start();
                
                setTimeout(() => {
                    overlay.style.display = 'none';
                    statusUI.style.display = 'block';
                    document.getElementById('status-text').innerText = 'Buscando imagen...';
                }, 1000);
            } catch (err) {
                console.error(err);
                startBtn.innerText = 'Reintentar';
                errorMsg.style.display = 'block';
                errorMsg.innerText = 'Error: Asegúrate de permitir el acceso a la cámara y de que los archivos .mind y .glb están en el repositorio.';
            }
        });

        // Listener para confirmar que el modelo carga
        document.getElementById('modelo-3d').addEventListener('model-loaded', () => console.log('✅ Modelo cargado'));
        document.getElementById('modelo-3d').addEventListener('model-error', (e) => {
            console.error('❌ Error cargando modelo:', e);
            document.getElementById('status-text').innerText = 'Error: No se encontró mi_modelo.glb';
        });
    </script>
</body>
</html>
