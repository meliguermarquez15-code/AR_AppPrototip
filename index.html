<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor AR Simple y Estable</title>
    
    <!-- Librerías CDN exactas -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* 1. Forzar pantalla completa y evitar scroll/zoom nativo */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none; /* Clave para que los gestos no muevan la página */
            background-color: #000;
            font-family: sans-serif;
        }

        /* 2. Asegurar que la escena y el video de la cámara ocupen todo */
        a-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* 3. Botón de inicio (Solución definitiva al problema de cámara negra) */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #start-btn {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 18px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        /* 4. UI de estado simple */
        #status-ui {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none; /* Dejar pasar los toques al modelo */
            display: none; /* Oculto hasta que inicie la cámara */
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Spinner de carga */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
            margin-top: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script>
        // ==========================================
        // COMPONENTE DE GESTOS (Mínimo y Estable)
        // ==========================================
        AFRAME.registerComponent('touch-gestures', {
            init: function () {
                this.isVisible = false;
                this.isTouching = false;
                this.startX = 0;
                this.startRotY = 0;
                this.startDist = 0;
                this.startScale = 0.5;

                const el = this.el;
                const target = document.querySelector('[mindar-image-target]');

                if (target) {
                    target.addEventListener('targetFound', () => { 
                        this.isVisible = true; 
                        document.getElementById('status-text').innerText = '¡Encontrado! 1 dedo: rotar, 2 dedos: escalar';
                    });
                    target.addEventListener('targetLost', () => { 
                        this.isVisible = false; 
                        document.getElementById('status-text').innerText = 'Buscando imagen...';
                    });
                }

                // Usamos { passive: false } para poder cancelar el scroll/zoom del navegador
                document.addEventListener('touchstart', this.onStart.bind(this), { passive: false });
                document.addEventListener('touchmove', this.onMove.bind(this), { passive: false });
                document.addEventListener('touchend', this.onEnd.bind(this), { passive: false });
            },

            onStart: function (e) {
                if (!this.isVisible) return;
                // Ignorar toques en botones (si los hubiera)
                if (e.target.tagName === 'BUTTON') return;
                
                e.preventDefault(); // Evita zoom/scroll nativo
                this.isTouching = true;
                
                // Pausar animación automática para que no luche con el dedo
                this.el.pauseAnimation('animation__rot');

                if (e.touches.length === 1) {
                    this.startX = e.touches[0].clientX;
                    this.startRotY = this.el.object3D.rotation.y * (180 / Math.PI);
                } else if (e.touches.length === 2) {
                    this.startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    this.startScale = this.el.object3D.scale.x;
                }
            },

            onMove: function (e) {
                if (!this.isTouching || !this.isVisible) return;
                if (e.target.tagName === 'BUTTON') return;
                e.preventDefault();

                if (e.touches.length === 1) {
                    const deltaX = e.touches[0].clientX - this.startX;
                    const newRot = this.startRotY + (deltaX * 0.8); // Sensibilidad
                    this.el.object3D.rotation.y = newRot * (Math.PI / 180);
                } else if (e.touches.length === 2) {
                    const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    let newScale = this.startScale * (currentDist / this.startDist);
                    // Limitar escala entre 0.2 y 1.5
                    newScale = Math.max(0.2, Math.min(1.5, newScale));
                    this.el.object3D.scale.set(newScale, newScale, newScale);
                }
            },

            onEnd: function (e) {
                if (!this.isVisible) return;
                if (e.touches.length === 0) {
                    this.isTouching = false;
                    // Reanudar rotación automática después de 500ms
                    setTimeout(() => {
                        if (!this.isTouching && this.isVisible) {
                            this.el.playAnimation('animation__rot');
                        }
                    }, 500);
                }
            }
        });
    </script>
</head>
<body>

    <!-- 1. Pantalla de inicio obligatoria para desbloquear la cámara en móviles -->
    <div id="start-overlay">
        <h2>Scanner AR Interactivo</h2>
        <p>Apunta la cámara a la imagen de referencia.<br>Usa 1 dedo para rotar, 2 para escalar.</p>
        <div id="loading-spinner" class="spinner"></div>
        <button id="start-btn">📷 Iniciar Cámara</button>
        <p id="error-msg" style="color: #ff6b6b; font-size: 12px; margin-top: 15px; display: none;"></p>
    </div>

    <!-- 2. UI de estado flotante -->
    <div id="status-ui">
        <span id="status-text">Iniciando...</span>
    </div>

    <!-- 3. Escena A-Frame -->
    <!-- autoStart: false es CLAVE para evitar el bloqueo de la cámara por el navegador -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="modelo-ar" src="./mi_modelo.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <!-- Iluminación simple y efectiva -->
            <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>
            <a-light type="directional" color="#ffffff" intensity="1.0" position="1 2 1"></a-light>
            
            <!-- Modelo con animación de entrada y rotación continua -->
            <a-gltf-model 
                id="modelo-3d"
                src="#modelo-ar" 
                position="0 0.1 0" 
                scale="0.5 0.5 0.5"
                touch-gestures
                animation__appear="property: scale; from: 0.01 0.01 0.01; to: 0.5 0.5 0.5; dur: 400; easing: easeOutQuad; startEvents: targetFound"
                animation__rot="property: rotation; to: 0 360 0; dur: 8000; easing: linear; loop: true; startEvents: targetFound; pauseEvents: targetLost">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        // ==========================================
        // LÓGICA DE CONTROL E INICIO SEGURO
        // ==========================================
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('start-overlay');
        const statusUI = document.getElementById('status-ui');
        const errorMsg = document.getElementById('error-msg');
        const spinner = document.getElementById('loading-spinner');
        const modelo = document.getElementById('modelo-3d');

        // Manejo de carga del modelo
        modelo.addEventListener('model-loaded', () => {
            console.log('✅ Modelo cargado correctamente');
            spinner.style.display = 'none';
        });

        modelo.addEventListener('model-error', (e) => {
            console.error('❌ Error al cargar el modelo:', e);
            spinner.style.display = 'none';
            document.getElementById('status-text').innerText = 'Error: No se encontró mi_modelo.glb';
        });

        // Verificar soporte de cámara
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = 'Tu navegador no soporta acceso a la cámara. Usa Chrome o Safari actualizado.';
            startBtn.disabled = true;
        }

        // INICIO SEGURO DE LA CÁMARA (Solución al problema de pantalla negra)
        startBtn.addEventListener('click', async () => {
            spinner.style.display = 'block';
            startBtn.style.display = 'none';

            try {
                const scene = document.querySelector('a-scene');
                
                // Esperar a que la escena esté lista
                await new Promise(resolve => {
                    if (scene.hasLoaded) resolve();
                    else scene.addEventListener('loaded', resolve);
                });

                // Iniciar el sistema de MindAR manualmente
                scene.systems['mindar-image'].start();
                
                // Ocultar overlay y mostrar UI de estado
                setTimeout(() => {
                    overlay.style.display = 'none';
                    statusUI.style.display = 'block';
                }, 1000);

            } catch (err) {
                console.error('Error al iniciar la cámara:', err);
                spinner.style.display = 'none';
                startBtn.style.display = 'block';
                startBtn.innerText = 'Reintentar';
                errorMsg.style.display = 'block';
                errorMsg.innerText = 'No se pudo acceder a la cámara. Asegúrate de usar HTTPS o localhost.';
            }
        });
    </script>
</body>
</html>
