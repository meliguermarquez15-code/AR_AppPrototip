<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scanner AR Interactivo</title>
    
    <!-- Enlace al archivo Manifest para PWA (mantenlo si lo configuraste) -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#222222">

    <!-- LIBRERÍAS BASE (A-Frame y MindAR) -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <!-- LIBRERÍA DE GESTOS TÁCTILES (Necesaria para detectar rotación y escala) -->
    <script src="https://unpkg.com/aframe-gesture-detector/dist/aframe-gesture-detector.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        
        /* Contenedor Flotante UI (Moderno/Glassmorphism) */
        #ui-card {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: 88%;
            max-width: 380px;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 16px;
            color: white;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.12);
            pointer-events: none; /* Deja pasar los toques al lienzo AR */
        }

        h3 { margin: 0 0 4px 0; font-size: 16px; }
        p { margin: 0; font-size: 12px; color: rgba(255, 255, 255, 0.7); }
    </style>

    <script>
        // --- COMPONENTE PERSONALIZADO PARA GESTIONAR LA MANIPULACIÓN ---
        // Este pequeño script escucha los gestos táctiles y mueve el modelo.
        AFRAME.registerComponent('gestos-modelo', {
          schema: {
            rotationFactor: {default: 5},
            minScale: {default: 0.05},
            maxScale: {default: 1.0}
          },

          init: function () {
            this.handleRotation = this.handleRotation.bind(this);
            this.handleScale = this.handleScale.bind(this);
            
            // Registramos los escuchadores de eventos táctiles proporcionados por 'gesture-detector'
            this.el.sceneEl.addEventListener('onefingermove', this.handleRotation);
            this.el.sceneEl.addEventListener('twofingermove', this.handleScale);
          },

          handleRotation: function (event) {
            // Solo rotar si el objetivo está activo (visible)
            if (!this.el.parentEl.getDOMAttribute('mindar-image-target').visible) return;

            const rotation = this.el.getAttribute('rotation');
            // 'detail.positionChange.x' nos dice cuánto se movió el dedo horizontalmente
            const newRotationY = rotation.y + (event.detail.positionChange.x * this.data.rotationFactor);
            this.el.setAttribute('rotation', {x: rotation.x, y: newRotationY, z: rotation.z});
          },

          handleScale: function (event) {
            if (!this.el.parentEl.getDOMAttribute('mindar-image-target').visible) return;

            const scale = this.el.getAttribute('scale');
            // 'detail.spreadChange' nos dice cuánto se alejaron o juntaron los dos dedos
            const scaleFactor = 1 + (event.detail.spreadChange * 0.01);
            let newScaleX = scale.x * scaleFactor;
            
            // Limitamos la escala para que no se vuelva gigante o invisible
            newScaleX = Math.min(Math.max(newScaleX, this.data.minScale), this.data.maxScale);
            this.el.setAttribute('scale', {x: newScaleX, y: newScaleX, z: newScaleX});
          }
        });
    </script>
</head>
<body>

    <!-- Interfaz de Usuario Informativa (ahora no interfiere con los toques) -->
    <div id="ui-card">
        <h3 id="status">Buscando imagen...</h3>
        <p>Apunta la cámara y usa 1 dedo para rotar, 2 para escalar el modelo.</p>
    </div>

    <!-- ESCENA DE RA -->
    <!-- Agregamos 'gesture-detector' a la escena principal para activar la detección táctil -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" 
        embedded
        gesture-detector
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="modelo3D" src="./mi_modelo.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- CONTENEDOR DEL OBJETIVO -->
        <a-entity id="target-1" mindar-image-target="targetIndex: 0">
            <!-- MODELO 3D INTERACTIVO -->
            <!-- 1. Aseguramos que la clase sea 'clickable' (para futuras interacciones) -->
            <!-- 2. Agregamos nuestro componente personalizado 'gestos-modelo' -->
            <a-gltf-model 
                class="clickable"
                gestos-modelo="rotationFactor: 10; minScale: 0.1; maxScale: 0.8"
                src="#modelo3D" 
                rotation="0 0 0" 
                position="0 0 0" 
                scale="0.2 0.2 0.2"
                animation__rot="property: rotation; to: 0 360 0; dur: 10000; easing: linear; loop: true; startEvents: targetLost; resumeEvents: targetFound"
                >
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        // Actualización simple de la UI cuando se detecta o pierde el objetivo
        const targetEntity = document.querySelector('#target-1');
        const statusText = document.getElementById("status");

        targetEntity.addEventListener("targetFound", () => {
            statusText.innerText = "¡Modelo Cargado! Interactúa con él.";
        });

        targetEntity.addEventListener("targetLost", () => {
            statusText.innerText = "Buscando imagen...";
        });
    </script>
</body>
</html>
