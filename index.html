<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Visor AR MindAR Interactivo</title>
    
    <!-- Librerías CDN exactas solicitadas -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* 1. Corrección del problema de cámara pequeña y prevención de scroll/zoom */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none; /* Previene gestos nativos del navegador */
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
        }

        a-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 2. UI Flotante Glassmorphism */
        .ui-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 16px 24px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            text-align: center;
            z-index: 100;
            pointer-events: none; /* Permite que los toques pasen al canvas de AR */
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            min-width: 280px;
        }

        .ui-container #status-text {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* Controles internos sí deben recibir eventos de toque */
        .controls {
            pointer-events: auto;
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        /* 3. Botones de acción y selector */
        .btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.2s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover, .btn:active {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.05);
        }

        .model-selector {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
            z-index: 100;
        }

        /* 4. Indicador de carga (Spinner) */
        .spinner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none; /* Oculto por defecto */
            z-index: 90;
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>

    <script>
        // ==========================================
        // COMPONENTE A-FRAME: GESTOS-MODELO
        // ==========================================
        AFRAME.registerComponent('gestos-modelo', {
            schema: {
                minScale: { type: 'number', default: 0.1 },
                maxScale: { type: 'number', default: 2.0 }
            },
            init: function () {
                this.isTargetVisible = false;
                this.isTouching = false;
                this.initialDistance = 0;
                this.initialScale = 0.5;
                this.startX = 0;
                this.initialRotationY = 0;
                this.resumeTimeout = null;

                const el = this.el;
                const targetEl = document.querySelector('[mindar-image-target]');

                // Escuchar eventos de visibilidad del target
                if (targetEl) {
                    targetEl.addEventListener('targetFound', () => {
                        this.isTargetVisible = true;
                        updateUI('¡Modelo encontrado! Usa 1 dedo para rotar, 2 para escalar');
                    });
                    targetEl.addEventListener('targetLost', () => {
                        this.isTargetVisible = false;
                        updateUI('Buscando imagen…');
                    });
                }

                // Bind de métodos para poder removerlos si fuera necesario
                this.boundStart = this.handleTouchStart.bind(this);
                this.boundMove = this.handleTouchMove.bind(this);
                this.boundEnd = this.handleTouchEnd.bind(this);

                // { passive: false } es OBLIGATORIO para que e.preventDefault() funcione
                document.addEventListener('touchstart', this.boundStart, { passive: false });
                document.addEventListener('touchmove', this.boundMove, { passive: false });
                document.addEventListener('touchend', this.boundEnd, { passive: false });
            },

            handleTouchStart: function (e) {
                // Permitir que los botones de la UI funcionen normalmente
                if (e.target.closest('.btn') || e.target.closest('.model-selector')) return;

                // Prevenir zoom/scroll del navegador
                if (e.touches.length > 0) e.preventDefault();

                if (!this.isTargetVisible) return;

                this.isTouching = true;
                clearTimeout(this.resumeTimeout);

                // Pausar animación automática para evitar conflictos
                this.el.pauseAnimation('animation__rot');

                if (e.touches.length === 1) {
                    this.startX = e.touches[0].clientX;
                    // Convertir rotación actual de radianes a grados para cálculo intuitivo
                    this.initialRotationY = this.el.object3D.rotation.y * (180 / Math.PI);
                } else if (e.touches.length === 2) {
                    this.initialDistance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    this.initialScale = this.el.object3D.scale.x;
                }
            },

            handleTouchMove: function (e) {
                if (!this.isTouching || !this.isTargetVisible) return;
                if (e.target.closest('.btn') || e.target.closest('.model-selector')) return;
                
                e.preventDefault(); // Prevenir comportamientos nativos

                if (e.touches.length === 1) {
                    // Rotación con 1 dedo (Eje Y)
                    const deltaX = e.touches[0].clientX - this.startX;
                    const newRotY = this.initialRotationY + (deltaX * 0.5); // 0.5 es la sensibilidad
                    this.el.object3D.rotation.y = newRotY * (Math.PI / 180);
                } else if (e.touches.length === 2) {
                    // Escala con 2 dedos (Pellizco)
                    const newDistance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    const scaleFactor = newDistance / this.initialDistance;
                    let newScale = this.initialScale * scaleFactor;
                    
                    // Limitar escala
                    newScale = Math.max(this.data.minScale, Math.min(this.data.maxScale, newScale));
                    this.el.object3D.scale.set(newScale, newScale, newScale);
                }
            },

            handleTouchEnd: function (e) {
                if (!this.isTargetVisible) return;
                
                // Si ya no hay toques, marcamos como false
                if (e.touches.length === 0) {
                    this.isTouching = false;
                    
                    // Reanudar animación automática 500ms después de soltar
                    this.resumeTimeout = setTimeout(() => {
                        if (!this.isTouching && this.isTargetVisible) {
                            this.el.playAnimation('animation__rot');
                        }
                    }, 500);
                }
            },

            remove: function () {
                document.removeEventListener('touchstart', this.boundStart);
                document.removeEventListener('touchmove', this.boundMove);
                document.removeEventListener('touchend', this.boundEnd);
            }
        });
    </script>
</head>
<body>

    <!-- Indicador de carga -->
    <div id="loading-spinner" class="spinner"></div>

    <!-- UI Flotante Inferior -->
    <div class="ui-container">
        <div id="status-text">Buscando imagen…</div>
        <div class="controls">
            <button class="btn" onclick="resetModel()" title="Reiniciar posición y escala">↺</button>
            <button class="btn" onclick="takeScreenshot()" title="Capturar pantalla">📷</button>
        </div>
    </div>

    <!-- Selector de Modelos Lateral -->
    <div class="model-selector">
        <button class="btn" onclick="changeModel('modelo1')" title="Modelo 1">M1</button>
        <button class="btn" onclick="changeModel('modelo2')" title="Modelo 2">M2</button>
        <button class="btn" onclick="changeModel('modelo3')" title="Modelo 3">M3</button>
    </div>

    <!-- Escena A-Frame / MindAR -->
    <!-- Sin atributo 'embedded', el CSS se encarga del 100% width/height -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiError: no; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <!-- Archivos locales esperados -->
            <a-asset-item id="modelo1" src="./mi_modelo.glb"></a-asset-item>
            <a-asset-item id="modelo2" src="./modelo2.glb"></a-asset-item>
            <a-asset-item id="modelo3" src="./modelo3.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <!-- Iluminación obligatoria para que el modelo se vea correctamente -->
            <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
            <a-light type="directional" color="#ffffff" intensity="0.9" position="1 1 1"></a-light>
            
            <!-- Modelo 3D -->
            <a-gltf-model 
                id="ar-model" 
                src="#modelo1" 
                position="0 0.1 0" 
                scale="0.5 0.5 0.5"
                gestos-modelo="minScale: 0.1; maxScale: 2.0"
                animation__appear="property: scale; from: 0.01 0.01 0.01; to: 0.5 0.5 0.5; dur: 500; startEvents: targetFound; easing: easeOutQuad"
                animation__rot="property: rotation; to: 0 360 0; dur: 10000; easing: linear; loop: true; startEvents: targetFound; pauseEvents: targetLost">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        // ==========================================
        // LÓGICA DE UI Y CONTROL
        // ==========================================
        
        // 1. Verificación de soporte de cámara
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            console.error('Tu navegador no soporta acceso a la cámara (getUserMedia).');
            document.getElementById('status-text').innerText = 'Error: Cámara no soportada en este navegador.';
        }

        const modelEl = document.getElementById('ar-model');
        const spinner = document.getElementById('loading-spinner');

        // 2. Manejo de errores y logs de carga del modelo
        function showSpinner(show) {
            spinner.style.display = show ? 'block' : 'none';
        }

        modelEl.addEventListener('model-loaded', () => {
            console.log('✅ Modelo cargado exitosamente');
            showSpinner(false);
        });

        modelEl.addEventListener('model-error', (e) => {
            console.error('❌ Error cargando el modelo:', e);
            showSpinner(false);
            document.getElementById('status-text').innerText = 'Error al cargar el modelo 3D';
        });

        // Mostrar spinner al iniciar la primera carga
        showSpinner(true);

        // 3. Funciones de control expuestas globalmente para los botones HTML
        function updateUI(message) {
            document.getElementById('status-text').innerText = message;
        }

        function changeModel(modelId) {
            console.log(`Cambiando a: ${modelId}`);
            modelEl.setAttribute('src', `#${modelId}`);
            
            // Restablecer valores base
            modelEl.object3D.scale.set(0.5, 0.5, 0.5);
            modelEl.object3D.rotation.set(0, 0, 0);
            
            showSpinner(true);
            
            // Si el target ya está visible, forzamos manualmente la animación de aparición
            const targetEl = document.querySelector('[mindar-image-target]');
            // Hack sencillo para reiniciar la animación de aparición si ya está visible
            if (targetEl && targetEl.getAttribute('mindar-image-target').isTrackable) {
                modelEl.removeAttribute('animation__appear');
                setTimeout(() => {
                    modelEl.setAttribute('animation__appear', 'property: scale; from: 0.01 0.01 0.01; to: 0.5 0.5 0.5; dur: 500; easing: easeOutQuad');
                    modelEl.emit('targetFound'); // Disparar manualmente
                }, 50);
            }
        }

        function resetModel() {
            console.log('Reiniciando modelo a estado original');
            modelEl.object3D.scale.set(0.5, 0.5, 0.5);
            modelEl.object3D.rotation.set(0, 0, 0);
            
            // Asegurar que la animación automática se reanude
            modelEl.playAnimation('animation__rot');
        }

        function takeScreenshot() {
            console.log('Capturando pantalla...');
            const canvas = document.querySelector('a-scene').canvas;
            if (canvas) {
                try {
                    const dataURL = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = `ar-capture-${Date.now()}.png`;
                    link.href = dataURL;
                    link.click();
                    console.log('✅ Captura descargada');
                } catch (err) {
                    console.error('Error al generar la captura (posiblemente por restricciones CORS del modelo):', err);
                    alert('No se pudo capturar la pantalla debido a restricciones de seguridad del navegador (CORS).');
                }
            }
        }
    </script>
</body>
</html>
